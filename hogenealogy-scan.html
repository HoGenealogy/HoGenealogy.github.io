<!DOCTYPE html>

<html lang="zh-Hant"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文獻影像｜廬江何氏族譜文獻</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --card: #fffdf9;
      --text: #222222;
      --muted: #666666;
      --line: #ddd6c8;
      --accent: #7a4b2a;
      --accent-hover: #5f391f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      font-size: 20px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      padding: 32px 24px;
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
      line-height: 1.3;
      text-align: center;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 32px 24px;
      margin-top: 24px;
      text-align: center;
    }

    p {
      color: var(--muted);
      margin-top: 0;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 24px;
      align-items: center;
    }

    a.download-link {
      display: inline-block;
      min-width: 280px;
      text-decoration: none;
      background: var(--accent);
      color: #ffffff;
      padding: 18px 20px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
    }

    a.download-link:hover {
      background: var(--accent-hover);
    }

    .back-link {
      display: inline-block;
      margin-top: 28px;
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      color: var(--accent-hover);
    }

    @media (max-width: 700px) {
      body { font-size: 18px; }
      h1 { font-size: 2rem; }
      a.download-link { width: 100%; min-width: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>文獻影像</h1>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
  
      <div class="links">
        <a class="download-link" href="https://kendrickho.github.io/genealogy-scan1.pdf" download="">廬江何氏族譜</a>
