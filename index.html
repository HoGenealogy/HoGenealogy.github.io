<!DOCTYPE html>

<html lang="zh-Hant"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廬江何氏族譜</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --card: #fffdf9;
      --text: #222222;
      --muted: #666666;
      --line: #ddd6c8;
      --accent: #7a4b2a;
      --accent-hover: #5f391f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      font-size: 20px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      padding: 32px 24px;
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
      line-height: 1.3;
      text-align: center;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px;
      margin-top: 24px;
    }

    h2 {
      margin-top: 0;
      font-size: 1.4rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }

    a.button {
      display: block;
      width: 80%;
      margin: 0 auto;
      text-decoration: none;
      background: var(--accent);
      color: #ffffff;
      padding: 18px 20px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      min-height: 60px;
    }

    a.button:hover {
      background: var(--accent-hover);
    }

    footer {
      max-width: 900px;
      margin: 24px auto 40px auto;
      padding: 0 24px;
    }

    .footer-panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px 24px;
      color: var(--muted);
      font-size: 0.95em;
      line-height: 1.8;
      text-align: center;
    }

    .footer-panel p {
      margin: 0 0 10px 0;
    }

    .footer-panel p:last-child {
      margin-bottom: 0;
    }

    .footer-panel a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer-panel a:hover {
      color: var(--accent-hover);
    }

    @media (max-width: 700px) {
      body { font-size: 18px; }
      h1 { font-size: 2rem; }
      a.button { width: 92%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>廬江何氏族譜文獻</h1>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <h2>網站簡介</h2>
      <p>
        本網站用於整理及展示廬江何氏（香港西貢南山一脉）相關族譜文獻，包括譜冊、序文、碑文、源流、宗譜世系、祭文、遺記、遺囑、詩文、解說與文獻影像，方便海內外親友查閱。
      </p>
    </section>

    <section class="panel">
      <div class="buttons">
        <a class="button" href="hogenealogy-archives.html">族譜文獻</a>
        <a class="button" href="hogenealogy-scan.html">文獻影像</a>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-panel">
      <p>如有意見或問題，可聯絡<a href="mailto:kendrickho@gmail.com">本人</a></p>
      <p>網站最後更新日期：2026年5月</p>
    </div>
  </footer>

</body></html>
